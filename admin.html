<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/styles/output.css">
<link rel="stylesheet" href="src/styles/app.css">
<title>پنل مدیریت</title>
</head>
<body class="bg-[#0B0E14] text-[#E6E6E6] font-fa antialiased">

<div class="flex flex-col h-screen border border-white/[0.07] overflow-hidden">

  <!-- topbar -->
  <div class="flex items-center justify-between px-[18px] py-3 border-b border-white/[0.07] bg-[#0D1117] shrink-0">
    <div class="flex items-center gap-2.5">
      <span class="font-mono text-base text-[#F2A65A] font-bold">&lt;/&gt;</span>
      <span class="font-bold text-[15px]">پنل مدیریت <span class="text-[#F2A65A]">نووا لبز</span></span>
    </div>
    <div class="flex items-center gap-3.5">
      <div class="flex items-center gap-2 text-[#9AA1AC] text-[13px] font-mono">
        <span class="w-[26px] h-[26px] rounded-full bg-[#F2A65A]/10 text-[#F2A65A] flex items-center justify-center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.5"/><path d="M4.5 20a7.5 7.5 0 0115 0" stroke-linecap="round"/></svg>
        </span>
        admin
      </div>
      <button class="text-[#5C6370] hover:text-[#E6E6E6] transition-colors" title="خروج">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H6a2 2 0 01-2-2V5a2 2 0 012-2h3" stroke-linecap="round"/><path d="M16 17l5-5-5-5M21 12H9" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <div class="flex flex-1 min-h-0">

    <!-- sidebar -->
    <aside class="w-[220px] border-l border-white/[0.07] bg-[#0D1117] p-[10px_10px] py-4 shrink-0 overflow-y-auto">
      <div class="flex items-center gap-1.5 text-[#5C6370] text-[11px] tracking-widest px-2 mb-2.5 font-mono">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
        ADMIN-PANEL
      </div>
      <div id="navList"></div>
    </aside>

    <!-- main -->
    <main class="flex-1 flex flex-col min-w-0">
      <div class="flex border-b border-white/[0.07] bg-[#11151D] shrink-0" id="tabbar"></div>

      <div class="flex items-center gap-2.5 px-[18px] py-3 border-b border-white/[0.04] shrink-0">
        <div class="relative flex-1 max-w-[320px]">
          <svg class="absolute top-[9px] right-[10px] text-[#5C6370]" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg>
          <input id="searchInput" placeholder="جستجو..." class="w-full bg-[#11151D] border border-white/[0.07] focus:border-[#F2A65A] rounded-lg py-2 pr-[34px] pl-3 text-[#E6E6E6] font-fa text-[13px] outline-none transition-colors">
        </div>
        <div class="flex-1"></div>
        <span class="font-mono text-xs text-[#5C6370]" id="countLabel"></span>
        <button id="addBtn" class="hidden items-center gap-1.5 bg-[#F2A65A] hover:bg-[#f5b877] text-[#0B0E14] rounded-lg px-3.5 py-2 font-medium text-[13px] transition-colors">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
          افزودن
        </button>
      </div>

      <div class="flex-1 overflow-y-auto p-4" id="listArea"></div>

      <div class="flex items-center gap-4 px-4 py-1.5 bg-[#11151D] border-t border-white/[0.04] font-mono text-[11px] text-[#5C6370] shrink-0">
        <span class="flex items-center gap-1">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3v12M6 15a3 3 0 100 6 3 3 0 000-6zM18 3a3 3 0 100 6 3 3 0 000-6zM18 9a9 9 0 01-9 9" stroke-linecap="round"/></svg>
          main
        </span>
        <span id="statUnread"></span>
        <span id="statPortfolio"></span>
        <span id="statPosts"></span>
        <div class="flex-1"></div>
        <span class="flex items-center gap-1.5">
          <svg width="8" height="8" viewBox="0 0 8 8" class="animate-pulse"><circle cx="4" cy="4" r="4" fill="#27C93F"/></svg>
          به‌روز
        </span>
      </div>
    </main>
  </div>
</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
/* ---------- state ---------- */
const state = {
  activeTab: 'messages',
  search: '',
  messages: [
    {id:1,name:'علی محمدی',email:'ali.m@example.com',subject:'شروع یک پروژه جدید',message:'سلام، می‌خوام برای فروشگاه اینترنتیم یه سایت جدید طراحی کنم. لطفاً باهام تماس بگیرید.',date:'۱۴۰۵/۰۴/۱۸',read:false},
    {id:2,name:'سارا احمدی',email:'sara.ahmadi@example.com',subject:'پیشنهاد همکاری',message:'با توجه به نمونه‌کارهاتون، مایل به همکاری بلندمدت هستیم.',date:'۱۴۰۵/۰۴/۱۷',read:true},
    {id:3,name:'رضا کریمی',email:'reza.k@example.com',subject:'پشتیبانی پروژه فعلی',message:'سایتی که پارسال طراحی کردید یه باگ کوچیک داره، می‌شه بررسی کنید؟',date:'۱۴۰۵/۰۴/۱۶',read:false},
    {id:4,name:'نیلوفر رضایی',email:'niloofar.r@example.com',subject:'سوال عمومی',message:'هزینه‌ی تقریبی طراحی یه لندینگ‌پیج ساده چقدره؟',date:'۱۴۰۵/۰۴/۱۴',read:true},
    {id:5,name:'امیر حسینی',email:'amir.h@example.com',subject:'شروع یک پروژه جدید',message:'نیاز به یک اپلیکیشن موبایل برای کسب‌وکارم دارم.',date:'۱۴۰۵/۰۴/۱۲',read:false},
  ],
  portfolio: [
    {id:1,title:'فروشگاه دیجی‌کالا مینیمال',category:'فروشگاهی',desc:'طراحی و توسعه‌ی فروشگاه آنلاین با تمرکز بر سرعت و تجربه‌ی کاربری.',featured:true,date:'۱۴۰۵/۰۲/۱۰',color:'#F2A65A'},
    {id:2,title:'اپلیکیشن مدیریت مالی نقره',category:'اپلیکیشن',desc:'طراحی رابط کاربری داشبورد مالی برای موبایل و وب.',featured:true,date:'۱۴۰۵/۰۱/۲۵',color:'#6BA5F2'},
    {id:3,title:'هویت بصری استودیو رنگین',category:'برندینگ',desc:'طراحی لوگو، پالت رنگی و راهنمای برند.',featured:false,date:'۱۴۰۴/۱۲/۰۸',color:'#8AF29C'},
    {id:4,title:'وب‌سایت شرکتی پارسیان',category:'طراحی وب',desc:'سایت معرفی شرکت با انیمیشن‌های اسکرول.',featured:false,date:'۱۴۰۴/۱۱/۱۹',color:'#F28A9C'},
  ],
  posts: [
    {id:1,title:'۷ اصل طراحی رابط کاربری که هر توسعه‌دهنده باید بداند',category:'طراحی',status:'published',author:'نووا لبز',date:'۱۴۰۵/۰۴/۰۱'},
    {id:2,title:'چرا سرعت سایت شما مهم‌تر از ظاهرشه؟',category:'توسعه',status:'published',author:'نووا لبز',date:'۱۴۰۵/۰۳/۲۲'},
    {id:3,title:'راهنمای انتخاب استک فنی برای پروژه‌های کوچک',category:'توسعه',status:'draft',author:'نووا لبز',date:'۱۴۰۵/۰۳/۱۵'},
    {id:4,title:'چطور قیمت پروژه‌ی طراحی سایت رو تعیین کنیم؟',category:'کسب‌وکار',status:'draft',author:'نووا لبز',date:'۱۴۰۵/۰۲/۲۸'},
  ],
  modal: null,
  confirmDelete: null,
};

const TABS = [
  {key:'messages', label:'پیام‌ها', file:'messages.js', icon:'mail'},
  {key:'portfolio', label:'نمونه‌کارها', file:'portfolio.json', icon:'image'},
  {key:'blog', label:'مقالات', file:'posts.md', icon:'file'},
];

const ICONS = {
  mail:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  image:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.8"/><path d="M21 15l-5-5-9 9" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  file:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2h9l5 5v15H6z"/><path d="M15 2v5h5" stroke-linejoin="round"/></svg>',
  star:'<svg width="13" height="13" viewBox="0 0 24 24" fill="#FFBD2E" stroke="#FFBD2E"><path d="M12 2l3.1 6.6 7.2.8-5.4 4.9 1.5 7.1L12 17.8 5.6 21.4l1.5-7.1L1.7 9.4l7.2-.8z"/></svg>',
  edit:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9" stroke-linecap="round"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z" stroke-linejoin="round"/></svg>',
  trash:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M9 7V4h6v3M6 7l1 14h10l1-14" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  clock:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2" stroke-linecap="round"/></svg>',
};

/* ---------- helpers ---------- */
const $ = (sel, root=document) => root.querySelector(sel);

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showToast(text){
  const root = $('#toastRoot');
  root.innerHTML = `<div class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-[#0D1117] border border-[#F2A65A] text-[#E6E6E6] px-[18px] py-2.5 rounded-lg text-[13px] flex items-center gap-2 z-[70]" id="toastEl">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#27C93F" stroke-width="2"><path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    ${escapeHtml(text)}
  </div>`;
  const el = $('#toastEl');
  gsap.fromTo(el, {y:20, opacity:0}, {y:0, opacity:1, duration:0.25});
  setTimeout(() => {
    gsap.to(el, {y:20, opacity:0, duration:0.2, onComplete:() => root.innerHTML=''});
  }, 2000);
}

/* ---------- render: sidebar / tabbar ---------- */
function renderNav(){
  $('#navList').innerHTML = TABS.map(t => {
    const active = state.activeTab === t.key;
    const badge = t.key === 'messages' ? state.messages.filter(m=>!m.read).length : 0;
    return `<button data-nav="${t.key}" class="w-full flex items-center gap-2 px-2.5 py-[9px] rounded-[7px] mb-[3px] cursor-pointer text-[13px] text-right transition-colors ${active ? 'bg-[#F2A65A]/10 text-[#F2A65A]' : 'text-[#9AA1AC] hover:bg-white/[0.03]'}">
      ${ICONS[t.icon]}
      <span class="flex-1 text-right">${t.label}</span>
      ${badge>0 ? `<span class="bg-[#F2A65A] text-[#0B0E14] text-[10px] font-bold rounded-full px-[6px] py-[1px] font-mono">${badge}</span>` : ''}
    </button>`;
  }).join('');
}

function renderTabbar(){
  $('#tabbar').innerHTML = TABS.map(t => {
    const active = state.activeTab === t.key;
    const showDot = t.key==='messages' && state.messages.some(m=>!m.read);
    return `<div data-nav="${t.key}" class="flex items-center gap-2 px-4 py-2.5 font-mono text-[12.5px] cursor-pointer border-l border-white/[0.04] border-t-2 ${active ? 'text-[#E6E6E6] bg-[#0B0E14] border-t-[#F2A65A]' : 'text-[#5C6370] border-t-transparent'}">
      ${t.file} ${showDot ? '<span class="w-1.5 h-1.5 rounded-full bg-[#F2A65A] inline-block"></span>' : ''}
    </div>`;
  }).join('');
}

/* ---------- render: list area ---------- */
function getFiltered(){
  const q = state.search.trim().toLowerCase();
  if(state.activeTab === 'messages'){
    return state.messages.filter(m => !q || m.name.toLowerCase().includes(q) || m.subject.toLowerCase().includes(q) || m.email.toLowerCase().includes(q));
  }
  if(state.activeTab === 'portfolio'){
    return state.portfolio.filter(p => !q || p.title.toLowerCase().includes(q) || p.category.toLowerCase().includes(q));
  }
  return state.posts.filter(p => !q || p.title.toLowerCase().includes(q) || p.category.toLowerCase().includes(q));
}

function renderList(){
  const area = $('#listArea');
  const items = getFiltered();
  $('#countLabel').textContent = items.length + ' مورد';
  $('#addBtn').classList.toggle('hidden', state.activeTab === 'messages');
  $('#addBtn').classList.toggle('flex', state.activeTab !== 'messages');

  if(items.length === 0){
    area.innerHTML = `<div class="text-center text-[#5C6370] py-[60px] font-mono text-[13px]">// چیزی یافت نشد</div>`;
    return;
  }

  const rowBase = "flex items-start gap-3 p-3.5 rounded-[10px] border border-white/[0.04] mb-2 bg-[#0D1117] cursor-pointer transition-colors hover:bg-white/[0.025] group";

  if(state.activeTab === 'messages'){
    area.innerHTML = items.map(m => `
      <div class="${rowBase}" data-view="${m.id}">
        <div class="mt-1">
          ${m.read
            ? `<svg width="9" height="9" viewBox="0 0 9 9"><circle cx="4.5" cy="4.5" r="4.5" fill="#5C6370"/></svg>`
            : `<svg width="9" height="9" viewBox="0 0 9 9"><circle cx="4.5" cy="4.5" r="4.5" fill="#F2A65A"/></svg>`}
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="text-sm ${m.read?'':'font-bold'}">${escapeHtml(m.name)}</span>
            <span class="font-mono text-[11px] text-[#5C6370]" dir="ltr">${escapeHtml(m.email)}</span>
          </div>
          <div class="text-[13.5px] my-1 ${m.read?'text-[#9AA1AC]':'text-[#E6E6E6]'}">${escapeHtml(m.subject)}</div>
          <div class="text-[12.5px] text-[#5C6370] whitespace-nowrap overflow-hidden text-ellipsis">${escapeHtml(m.message)}</div>
        </div>
        <div class="flex items-center gap-2.5">
          <span class="font-mono text-[11px] text-[#5C6370] whitespace-nowrap">${m.date}</span>
          <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <button class="text-[#5C6370] hover:text-[#E6E6E6] p-1" data-delete="messages:${m.id}">${ICONS.trash}</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  else if(state.activeTab === 'portfolio'){
    area.innerHTML = `<div class="grid gap-3" style="grid-template-columns:repeat(auto-fill,minmax(260px,1fr))">` + items.map(p => `
      <div class="border border-white/[0.04] rounded-[10px] bg-[#0D1117] overflow-hidden group">
        <div class="h-[90px] flex items-center justify-center border-b border-white/[0.04]" style="background:linear-gradient(135deg, ${p.color}33, ${p.color}0d);">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${p.color}" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.8"/><path d="M21 15l-5-5-9 9"/></svg>
        </div>
        <div class="p-3">
          <div class="flex items-center gap-1.5 mb-1.5">
            ${p.featured ? ICONS.star : ''}
            <span class="font-bold text-[13.5px]">${escapeHtml(p.title)}</span>
          </div>
          <span class="font-mono text-[10.5px] text-[#F2A65A] bg-[#F2A65A]/10 px-2 py-0.5 rounded-full">${escapeHtml(p.category)}</span>
          <div class="text-xs text-[#9AA1AC] mt-2 leading-[1.7]">${escapeHtml(p.desc)}</div>
          <div class="flex items-center justify-between mt-3">
            <span class="font-mono text-[10.5px] text-[#5C6370]">${p.date}</span>
            <div class="flex gap-1">
              <button class="text-[#9AA1AC] hover:text-[#E6E6E6] p-1" data-edit="portfolio:${p.id}">${ICONS.edit}</button>
              <button class="text-[#5C6370] hover:text-[#E6E6E6] p-1" data-delete="portfolio:${p.id}">${ICONS.trash}</button>
            </div>
          </div>
        </div>
      </div>
    `).join('') + `</div>`;
  }

  else {
    area.innerHTML = items.map(p => `
      <div class="flex items-center gap-3.5 px-3.5 py-3 rounded-[10px] border border-white/[0.04] mb-2 bg-[#0D1117] group">
        ${ICONS.file}
        <div class="flex-1 min-w-0">
          <div class="font-semibold text-sm mb-1">${escapeHtml(p.title)}</div>
          <div class="flex items-center gap-2 flex-wrap">
            <span class="font-mono text-[10.5px] text-[#9AA1AC] bg-white/[0.05] px-2 py-0.5 rounded-full">${escapeHtml(p.category)}</span>
            <span class="font-mono text-[10.5px] px-2 py-0.5 rounded-full ${p.status==='published'?'text-[#27C93F] bg-[#27C93F]/10':'text-[#FFBD2E] bg-[#FFBD2E]/10'}">${p.status==='published'?'منتشرشده':'پیش‌نویس'}</span>
            <span class="flex items-center gap-1 text-[11px] text-[#5C6370]">${ICONS.clock}${p.date}</span>
          </div>
        </div>
        <div class="flex gap-1">
          <button class="text-[#9AA1AC] hover:text-[#E6E6E6] p-1" data-edit="blog:${p.id}">${ICONS.edit}</button>
          <button class="text-[#5C6370] hover:text-[#E6E6E6] p-1" data-delete="blog:${p.id}">${ICONS.trash}</button>
        </div>
      </div>
    `).join('');
  }

  gsap.fromTo(area.children, {opacity:0, y:8}, {opacity:1, y:0, duration:0.25, stagger:0.03});
}

/* ---------- status bar ---------- */
function renderStatus(){
  $('#statUnread').textContent = state.messages.filter(m=>!m.read).length + ' پیام خوانده‌نشده';
  $('#statPortfolio').textContent = state.portfolio.length + ' نمونه‌کار';
  $('#statPosts').textContent = state.posts.length + ' مقاله';
}

/* ---------- modal ---------- */
function openModal(mode, section, data){
  state.modal = {mode, section, data};
  renderModal();
}
function closeModal(){
  state.modal = null;
  $('#modalRoot').innerHTML = '';
}

const inputCls = "w-full bg-[#11151D] border border-white/[0.07] focus:border-[#F2A65A] rounded-lg px-3 py-2.5 text-[#E6E6E6] font-fa text-sm outline-none transition-colors";

function renderModal(){
  const root = $('#modalRoot');
  if(!state.modal){ root.innerHTML=''; return; }
  const {mode, section, data} = state.modal;
  const fileLabel = mode==='view' ? 'view-message.js' : mode==='add' ? 'new-item.js' : 'edit-item.js';

  let bodyHtml = '';

  if(mode==='view' && section==='messages'){
    bodyHtml = `
      <div class="mb-3.5">
        <div class="text-base font-bold mb-1">${escapeHtml(data.name)}</div>
        <div class="font-mono text-xs text-[#F2A65A]" dir="ltr">${escapeHtml(data.email)}</div>
      </div>
      <div class="text-[13px] text-[#9AA1AC] mb-3">موضوع: <span class="text-[#E6E6E6]">${escapeHtml(data.subject)}</span></div>
      <div class="bg-[#11151D] border border-white/[0.04] rounded-lg p-3.5 text-[13.5px] leading-[1.9]">${escapeHtml(data.message)}</div>
      <div class="font-mono mt-3.5 text-[11px] text-[#5C6370]">${data.date}</div>
    `;
  } else if(section==='portfolio'){
    const d = data || {title:'',category:'طراحی وب',desc:'',featured:false};
    bodyHtml = `
      <div class="mb-4"><label class="block text-[13px] text-[#9AA1AC] mb-1.5">عنوان پروژه</label>
        <input class="${inputCls}" id="f-title" value="${escapeHtml(d.title)}" placeholder="مثلاً فروشگاه دیجی‌کالا مینیمال"></div>
      <div class="mb-4"><label class="block text-[13px] text-[#9AA1AC] mb-1.5">دسته‌بندی</label>
        <select class="${inputCls}" id="f-category">
          ${['طراحی وب','فروشگاهی','اپلیکیشن','برندینگ'].map(c=>`<option value="${c}" ${d.category===c?'selected':''}>${c}</option>`).join('')}
        </select></div>
      <div class="mb-4"><label class="block text-[13px] text-[#9AA1AC] mb-1.5">توضیحات</label>
        <textarea class="${inputCls} min-h-[80px] resize-y" id="f-desc">${escapeHtml(d.desc)}</textarea></div>
      <label class="flex items-center gap-2 mb-4.5 text-[13px] text-[#9AA1AC] cursor-pointer"><input type="checkbox" id="f-featured" ${d.featured?'checked':''}> نمایش به‌عنوان پروژه‌ی ویژه</label>
      <div class="flex gap-2">
        <button id="modalCancel" class="flex-1 py-2.5 rounded-lg border border-white/[0.07] text-[#E6E6E6] text-[13px] hover:bg-white/[0.03] transition-colors">انصراف</button>
        <button id="modalSave" class="flex-1 py-2.5 rounded-lg bg-[#F2A65A] hover:bg-[#f5b877] text-[#0B0E14] text-[13px] font-bold transition-colors">ذخیره</button>
      </div>
    `;
  } else if(section==='blog'){
    const d = data || {title:'',category:'توسعه',status:'draft'};
    bodyHtml = `
      <div class="mb-4"><label class="block text-[13px] text-[#9AA1AC] mb-1.5">عنوان مقاله</label>
        <input class="${inputCls}" id="f-title" value="${escapeHtml(d.title)}" placeholder="مثلاً چطور قیمت پروژه رو تعیین کنیم؟"></div>
      <div class="mb-4"><label class="block text-[13px] text-[#9AA1AC] mb-1.5">دسته‌بندی</label>
        <select class="${inputCls}" id="f-category">
          ${['توسعه','طراحی','کسب‌وکار'].map(c=>`<option value="${c}" ${d.category===c?'selected':''}>${c}</option>`).join('')}
        </select></div>
      <div class="mb-4"><label class="block text-[13px] text-[#9AA1AC] mb-1.5">وضعیت</label>
        <select class="${inputCls}" id="f-status">
          <option value="draft" ${d.status==='draft'?'selected':''}>پیش‌نویس</option>
          <option value="published" ${d.status==='published'?'selected':''}>منتشرشده</option>
        </select></div>
      <div class="flex gap-2 mt-1.5">
        <button id="modalCancel" class="flex-1 py-2.5 rounded-lg border border-white/[0.07] text-[#E6E6E6] text-[13px] hover:bg-white/[0.03] transition-colors">انصراف</button>
        <button id="modalSave" class="flex-1 py-2.5 rounded-lg bg-[#F2A65A] hover:bg-[#f5b877] text-[#0B0E14] text-[13px] font-bold transition-colors">ذخیره</button>
      </div>
    `;
  }

  root.innerHTML = `
    <div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-5" id="modalOverlay">
      <div class="w-full max-w-[480px] bg-[#0D1117] border border-white/[0.07] rounded-xl overflow-hidden" id="modalBox">
        <div class="flex items-center gap-2 px-4 py-3 border-b border-white/[0.07] bg-[#11151D]">
          <span class="w-2.5 h-2.5 rounded-full bg-[#FF5F56]"></span>
          <span class="w-2.5 h-2.5 rounded-full bg-[#FFBD2E]"></span>
          <span class="w-2.5 h-2.5 rounded-full bg-[#27C93F]"></span>
          <span class="font-mono mr-2 text-xs text-[#5C6370]">${fileLabel}</span>
          <div class="flex-1"></div>
          <button id="modalClose" class="text-[#5C6370] hover:text-[#E6E6E6]">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="p-5 max-h-[70vh] overflow-y-auto">${bodyHtml}</div>
      </div>
    </div>
  `;

  gsap.fromTo('#modalBox', {opacity:0, scale:0.96}, {opacity:1, scale:1, duration:0.2});

  $('#modalOverlay').addEventListener('click', e => { if(e.target.id==='modalOverlay') closeModal(); });
  const closeBtn = $('#modalClose'); if(closeBtn) closeBtn.onclick = closeModal;
  const cancelBtn = $('#modalCancel'); if(cancelBtn) cancelBtn.onclick = closeModal;
  const saveBtn = $('#modalSave'); if(saveBtn) saveBtn.onclick = saveModalForm;
}

function saveModalForm(){
  const {mode, section, data} = state.modal;
  const title = $('#f-title').value.trim();
  if(!title) return;

  if(section === 'portfolio'){
    const form = {
      title,
      category: $('#f-category').value,
      desc: $('#f-desc').value,
      featured: $('#f-featured').checked,
    };
    if(mode === 'add'){
      state.portfolio.unshift({id:Date.now(), date:'امروز', color:'#F2A65A', ...form});
    } else {
      const idx = state.portfolio.findIndex(x=>x.id===data.id);
      state.portfolio[idx] = {...state.portfolio[idx], ...form};
    }
  } else if(section === 'blog'){
    const form = {
      title,
      category: $('#f-category').value,
      status: $('#f-status').value,
    };
    if(mode === 'add'){
      state.posts.unshift({id:Date.now(), author:'نووا لبز', date:'امروز', ...form});
    } else {
      const idx = state.posts.findIndex(x=>x.id===data.id);
      state.posts[idx] = {...state.posts[idx], ...form};
    }
  }

  closeModal();
  showToast(mode==='add' ? 'با موفقیت اضافه شد' : 'تغییرات ذخیره شد');
  renderAll();
}

/* ---------- delete confirm ---------- */
function askDelete(section, id){
  state.confirmDelete = {section, id};
  const root = $('#modalRoot');
  root.innerHTML = `
    <div class="fixed inset-0 bg-black/60 flex items-center justify-center z-[60]" id="confirmOverlay">
      <div class="bg-[#0D1117] border border-white/[0.07] rounded-xl p-[22px] w-[320px] text-center" id="confirmBox">
        <div class="text-[#FF5F56] mb-2.5 flex justify-center">${ICONS.trash.replace('width="14" height="14"','width="22" height="22"')}</div>
        <div class="text-sm mb-1">مطمئنی می‌خوای این مورد حذف بشه؟</div>
        <div class="text-xs text-[#5C6370] mb-[18px]">این عمل قابل بازگشت نیست.</div>
        <div class="flex gap-2">
          <button id="confirmCancel" class="flex-1 py-2.5 rounded-lg border border-white/[0.07] text-[#E6E6E6] text-[13px] hover:bg-white/[0.03] transition-colors">انصراف</button>
          <button id="confirmOk" class="flex-1 py-2.5 rounded-lg bg-[#FF5F56] text-white text-[13px] font-bold hover:brightness-105 transition-[filter]">حذف</button>
        </div>
      </div>
    </div>
  `;
  gsap.fromTo('#confirmBox', {opacity:0, scale:0.96}, {opacity:1, scale:1, duration:0.2});
  $('#confirmOverlay').addEventListener('click', e => { if(e.target.id==='confirmOverlay'){ state.confirmDelete=null; root.innerHTML=''; }});
  $('#confirmCancel').onclick = () => { state.confirmDelete=null; root.innerHTML=''; };
  $('#confirmOk').onclick = () => {
    if(section==='messages') state.messages = state.messages.filter(x=>x.id!==id);
    if(section==='portfolio') state.portfolio = state.portfolio.filter(x=>x.id!==id);
    if(section==='blog') state.posts = state.posts.filter(x=>x.id!==id);
    state.confirmDelete = null;
    root.innerHTML = '';
    showToast('حذف شد');
    renderAll();
  };
}

/* ---------- render all ---------- */
function renderAll(){
  renderNav();
  renderTabbar();
  renderList();
  renderStatus();
}

/* ---------- events (delegation) ---------- */
document.addEventListener('click', (e) => {
  const navBtn = e.target.closest('[data-nav]');
  if(navBtn){
    state.activeTab = navBtn.dataset.nav;
    state.search = '';
    $('#searchInput').value = '';
    renderAll();
    return;
  }

  const viewEl = e.target.closest('[data-view]');
  if(viewEl && !e.target.closest('[data-delete]')){
    const id = Number(viewEl.dataset.view);
    const msg = state.messages.find(m=>m.id===id);
    if(msg){
      msg.read = true;
      openModal('view', 'messages', msg);
      renderNav(); renderTabbar(); renderStatus();
    }
    return;
  }

  const editEl = e.target.closest('[data-edit]');
  if(editEl){
    const [section, idStr] = editEl.dataset.edit.split(':');
    const id = Number(idStr);
    const list = section==='portfolio' ? state.portfolio : state.posts;
    const item = list.find(x=>x.id===id);
    openModal('edit', section, item);
    return;
  }

  const delEl = e.target.closest('[data-delete]');
  if(delEl){
    const [section, idStr] = delEl.dataset.delete.split(':');
    askDelete(section, Number(idStr));
    return;
  }
});

$('#searchInput').addEventListener('input', (e) => {
  state.search = e.target.value;
  renderList();
});

$('#addBtn').addEventListener('click', () => {
  openModal('add', state.activeTab, null);
});

/* ---------- init ---------- */
renderAll();
</script>
</body>
</html>
